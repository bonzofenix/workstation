# Vim-style navigation
set-window-option -g mode-keys vi
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# Shell and terminal settings
set -g default-shell /bin/zsh
set -g default-terminal "screen-256color"

# Mouse and history
set -g mouse on
set -g history-limit 500000

# Window/pane behavior
bind-key C-b last-window
set -g base-index 1
set -s escape-time 0
set-option -g allow-passthrough on

# Split panes with | and -
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Vim-style copy mode
setw -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "reattach-to-user-namespace pbcopy"
unbind -T copy-mode-vi Enter
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "reattach-to-user-namespace pbcopy"

# Tab/window naming
set -g allow-rename off
set-option -g automatic-rename on
set-option -g automatic-rename-format '#{b:pane_current_path}'

# Reload config
bind-key r source-file ~/.tmux.conf \; display-message "~/.tmux.conf reloaded"

# Status bar styling
setw -g window-status-current-style fg=colour135,bg=black
set -g status-interval 1
set -g status-right '#( source ~/.zshenv ; chess clock)'
set -g status-bg colour135
setw -g aggressive-resize on
setw -g window-status-separator " | "

# Clear peon-ping alert styling when switching to window with @claude_alert
set-hook -g session-window-changed 'if-shell -F "#{@claude_alert}" "run-shell \"tmux set-window-option window-status-style default ; tmux rename-window -t #{window_id} \\\"#{@claude_original_name}\\\" ; tmux set-option -wu @claude_alert ; tmux set-option -wu @claude_original_name\""'

# Plugins (install tpm first: https://github.com/tmux-plugins/tpm)
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'

# Initialize TMUX plugin manager (keep at bottom)
run '~/.tmux/plugins/tpm/tpm'
